<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StayEase PG</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #F0D080;
            --dark: #1A1A2E;
            --dark-2: #16213E;
            --white: #FFFFFF;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: radial-gradient(circle at top right, var(--dark-2), var(--dark));
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin-bottom: 8px;
        }
        .logo span { color: var(--white); }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--white);
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .role-option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        .role-option.active {
            background: var(--gold);
            color: var(--dark);
            border-color: var(--gold);
            font-weight: 700;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--dark);
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 12px;
        }

        .login-btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(201, 168, 76, 0.3);
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .footer-links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Decorative elements */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(201, 168, 76, 0.1); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(15, 52, 96, 0.4); bottom: -50px; right: -50px; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="login-container">
        <div class="logo">Stay<span>Ease</span></div>
        <p class="subtitle">Welcome back! Please login to your account.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••" required>
            </div>

            <label style="font-size: 13px; color: rgba(255, 255, 255, 0.7); display: block; margin-bottom: 8px;">Login as</label>
            <div class="role-selector">
                <div class="role-option active" onclick="setRole('admin', this)">Admin</div>
                <div class="role-option" onclick="setRole('receptionist', this)">Staff</div>
                <div class="role-option" onclick="setRole('tenant', this)">Tenant</div>
            </div>

            <button type="button" class="login-btn" onclick="handleLogin()">Login to Dashboard</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>

    <script>
        let selectedRole = 'admin';

        function setRole(role, element) {
            selectedRole = role;
            document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
        }

        function handleLogin() {
            // In a real app, this would be an AJAX call to the backend
            // For now, we'll just redirect to the corresponding dashboard
            if (selectedRole === 'admin') {
                window.location.href = '/admin/dashboard';
            } else if (selectedRole === 'receptionist') {
                window.location.href = '/receptionist/dashboard';
            } else {
                window.location.href = '/tenant/dashboard';
            }
        }
    </script>
</body>
</html>
