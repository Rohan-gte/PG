<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>New Tenant Registration - StaySync</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-container { max-width: 800px; margin: 0 auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem; }
        .checkbox-group input { width: auto; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>StaySync</h2>
        <nav>
            <ul>
                <li><a href="/receptionist/dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/receptionist/registration" class="active"><i class="fas fa-user-plus"></i> New Registration</a></li>
                <li><a href="/receptionist/availability"><i class="fas fa-bed"></i> Room Availability</a></li>
                <li><a href="/receptionist/payments"><i class="fas fa-money-bill-wave"></i> Collect Payments</a></li>
                <li><a href="/receptionist/visitors"><i class="fas fa-walking"></i> Visitor Entry</a></li>
                <li><a href="/receptionist/complaints"><i class="fas fa-tools"></i> Complaints</a></li>
                <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>New Tenant Registration</h1>
        </header>

        <div class="section-card form-container animate-fade-in">
            <form action="/receptionist/registration" method="POST">
                <h3 style="margin-bottom: 1.5rem; color: var(--primary-color);">Personal Details</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phoneNumber" placeholder="+91 9876543210" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Aadhar / ID Number</label>
                        <input type="text" name="idNumber" placeholder="XXXX-XXXX-XXXX" required>
                    </div>
                </div>

                <h3 style="margin-top: 2rem; margin-bottom: 1.5rem; color: var(--primary-color);">Allocation Details</h3>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Select Room</label>
                        <select name="roomId" required>
                            <option value="">Choose Available Room</option>
                            <!-- Dynamic options -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Joining Date</label>
                        <input type="date" name="joiningDate" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="verifyDocs" name="isDocumentsVerified" required>
                    <label for="verifyDocs">I confirm that all documents (ID Proof, Photo) have been verified.</label>
                </div>

                <button type="submit" class="stat-card" style="width: 100%; margin-top: 2rem; background: var(--primary-color); color: white; border: none; cursor: pointer; font-size: 1.1rem;">
                    Complete Registration & Check-in
                </button>
            </form>
        </div>
    </div>
</body>
</html>
