<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Visitor Management - StaySync</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2>StaySync</h2>
        <nav>
            <ul>
                <li><a href="/receptionist/dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="/receptionist/registration"><i class="fas fa-user-plus"></i> New Registration</a></li>
                <li><a href="/receptionist/availability"><i class="fas fa-bed"></i> Room Availability</a></li>
                <li><a href="/receptionist/payments"><i class="fas fa-money-bill-wave"></i> Collect Payments</a></li>
                <li><a href="/receptionist/visitors" class="active"><i class="fas fa-walking"></i> Visitor Entry</a></li>
                <li><a href="/receptionist/complaints"><i class="fas fa-tools"></i> Complaints</a></li>
                <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Visitor Management</h1>
            <button class="btn-primary" style="padding: 0.75rem 1.5rem; background: var(--primary-color); color: white; border: none; border-radius: 0.5rem; cursor: pointer;">
                <i class="fas fa-plus"></i> New Entry
            </button>
        </header>

        <div class="section-card animate-fade-in">
            <h2>Current Visitors</h2>
            <div class="activity-list" style="margin-top: 1rem;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid #f1f5f9;">
                            <th style="padding: 1rem;">Visitor Name</th>
                            <th style="padding: 1rem;">Visiting Tenant</th>
                            <th style="padding: 1rem;">Check-in</th>
                            <th style="padding: 1rem;">Status</th>
                            <th style="padding: 1rem;">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 2rem; color: var(--text-muted);">No active visitors at the moment.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
