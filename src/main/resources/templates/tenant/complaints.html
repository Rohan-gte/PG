<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Raise Complaint - StaySync</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2>StaySync</h2>
        <nav>
            <ul>
                <li><a href="/tenant/dashboard"><i class="fas fa-th-large"></i> Dashboard</a></li>
                <li><a href="/tenant/payments"><i class="fas fa-wallet"></i> Rent & Payments</a></li>
                <li><a href="/tenant/food"><i class="fas fa-utensils"></i> Food Menu</a></li>
                <li><a href="/tenant/complaints" class="active"><i class="fas fa-headset"></i> Raise Complaint</a></li>
                <li><a href="/tenant/visitors"><i class="fas fa-user-check"></i> Visitor Approval</a></li>
                <li style="margin-top: auto;"><a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Service Requests</h1>
        </header>

        <div class="section-card animate-fade-in" style="max-width: 600px;">
            <h2>New Complaint</h2>
            <form action="/tenant/complaints" method="POST" style="margin-top: 1.5rem;">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Subject</label>
                    <select style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
                        <option>Plumbing Issue</option>
                        <option>Electrical Issue</option>
                        <option>Cleaning Required</option>
                        <option>Internet/Wi-Fi</option>
                        <option>Other</option>
                    </select>
                </div>
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 0.5rem; color: var(--text-muted);">Description</label>
                    <textarea style="width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; min-height: 100px;" placeholder="Describe the issue..."></textarea>
                </div>
                <button type="submit" style="width: 100%; padding: 1rem; background: var(--primary-color); color: white; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;">
                    Submit Complaint
                </button>
            </form>
        </div>
    </div>
</body>
</html>
