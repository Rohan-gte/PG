spring.application.name=pg
server.port=8085

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/pg_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Multipart uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB

# Application config
app.uploads.dir=./uploads
app.jwt.secret=Y2hhbmdlLW1lLXRoaXMtaXMtYS1zZWNyZXQta2V5LWZvci1wZy1tZ210LXN5c3RlbS1qd3QtMjU2Yml0
app.jwt.expiration-ms=86400000
# Include app origin on 127.0.0.1 — mismatch with localhost causes CORS 403 with credentials.
app.cors.allowed-origins=http://localhost:8085,http://127.0.0.1:8085,http://localhost:5500,http://127.0.0.1:5500

# Seed flags
pg.seed.admin=true
pg.seed.demo=false

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.example.demo=INFO
